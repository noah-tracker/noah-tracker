<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noah Tracker</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --primary: #5dade2;
            --bg: #1e1e2f;
            --card-bg: #2a2a3c;
            --text: #e0e0e0;
            --danger: #e74c3c;
            --warning: #f39c12;
            --border: #444;
        }
        body.light-mode {
            --primary: #3498db;
            --bg: #f0f8ff;
            --card-bg: #fff;
            --text: #2c3e50;
            --danger: #e74c3c;
            --warning: #f39c12;
            --border: #ddd;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 1rem;
            max-width: 600px;
            margin: auto;
            transition: background 0.3s, color 0.3s;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }
        h1 { color: var(--primary); margin: 0; font-size: 1.5rem; }
        .header-buttons { display: flex; gap: 0.5rem; }
        .lang-toggle, .theme-toggle {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
        }
        .subtitle { text-align: center; font-size: 0.9rem; color: #7f8c8d; margin-bottom: 0.5rem; }
        .daily-summary {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 0.8rem;
            margin-bottom: 0.8rem;
            text-align: center;
            font-size: 0.9rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border: 1px solid var(--border);
        }
        .status {
            text-align: center;
            font-size: 0.8rem;
            color: #7f8c8d;
            margin-bottom: 1rem;
            white-space: pre-line;
            line-height: 1.3;
        }
        .alert {
            padding: 0.5rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            text-align: center;
            font-weight: bold;
        }
        .alert-warning { background: #fef3cd; color: #856404; }
        .alert-info { background: #d1ecf1; color: #0c5460; }
        form {
            background: var(--card-bg);
            padding: 1.2rem;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 1.5rem;
            border: 1px solid var(--border);
        }
        label {
            display: block;
            font-weight: bold;
            margin-top: 0.8rem;
            margin-bottom: 0.2rem;
            color: var(--text);
        }
        input, select, textarea {
            width: 100%;
            padding: 0.6rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            background: var(--card-bg);
            color: var(--text);
        }
        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.7rem 1.2rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1rem;
            width: 100%;
        }
        button.delete-btn { background: var(--danger); }
        .entry-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 0.8rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            position: relative;
            border: 1px solid var(--border);
        }
        .entry-card .actions {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            display: flex;
            gap: 0.3rem;
        }
        .entry-card .actions button {
            background: transparent;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            width: auto;
            padding: 0.2rem 0.4rem;
            color: var(--text);
        }
        .badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: bold;
            color: white;
            margin-right: 0.4rem;
        }
        .badge-biberon { background: #1abc9c; }
        .badge-repas { background: #27ae60; }
        .badge-pipi { background: #3498db; }
        .badge-caca { background: #8e44ad; }
        .badge-sommeil { background: #e67e22; }
        .badge-rdv { background: #e74c3c; }
        .badge-bain { background: #2980b9; }
        .badge-medicament { background: #e67e22; }
        .badge-temp { background: #e74c3c; }
        .badge-mesures { background: #16a085; }
        .badge-autre { background: #95a5a6; }
        hr { margin: 0.8rem 0; border-color: var(--border); }

        .extra-fields { display: none; }
        .extra-fields.active { display: block; }

        .filter-bar {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .filter-bar label { margin: 0; font-weight: normal; font-size: 0.9rem; }
        .filter-bar input, .filter-bar select {
            width: auto;
            flex: 1;
            min-width: 120px;
            padding: 0.4rem;
            font-size: 0.9rem;
        }
        .filter-bar button {
            width: auto;
            padding: 0.4rem 0.8rem;
            margin-top: 0;
        }
        .export-btn {
            background: #27ae60;
            margin-top: 0.5rem;
            width: auto;
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
        }
    </style>
</head>

    <div id="appointmentAlert" class="alert alert-warning" style="display:none;"></div>

    <form id="mainForm">
        <input type="hidden" id="entryId">

        <select id="eventType" required></select>

        <label for="eventDate" id="lblEventDate"></label>
        <input type="datetime-local" id="eventDate" required>

        <!-- Biberon -->
        <div id="fieldsBiberon" class="extra-fields">
            <label for="biberonQuantite" id="lblBibQty"></label>
            <input type="text" id="biberonQuantite" placeholder="180" inputmode="numeric">
            <label for="biberonType" id="lblBibType"></label>
            <input type="text" id="biberonType" placeholder="">
        </div>

        <!-- Repas solide -->
        <div id="fieldsRepas" class="extra-fields">
            <label for="repasDescription" id="lblRepasDesc"></label>
            <input type="text" id="repasDescription" placeholder="">
            <label for="repasQuantite" id="lblRepasQty"></label>
            <input type="text" id="repasQuantite" placeholder="">
        </div>

        <!-- Caca -->
        <div id="fieldsCaca" class="extra-fields">
            <label id="lblConsistanceCaca"></label>
            <select id="cacaConsistance"></select>
        </div>

        <!-- Sommeil -->
        <div id="fieldsSommeil" class="extra-fields">
            <label for="sleepStart" id="lblSleepStart"></label>
            <input type="datetime-local" id="sleepStart">
            <label for="sleepEnd" id="lblSleepEnd"></label>
            <input type="datetime-local" id="sleepEnd">
        </div>

        <!-- Rendez-vous -->
        <div id="fieldsRdv" class="extra-fields">
            <label for="rdvDesc" id="lblRdvDesc"></label>
            <input type="text" id="rdvDesc" placeholder="">
            <label for="rdvDate" id="lblRdvDate"></label>
            <input type="datetime-local" id="rdvDate">
        </div>

        <!-- Température -->
        <div id="fieldsTemp" class="extra-fields">
            <label for="tempValue" id="lblTempValue"></label>
            <input type="number" id="tempValue" step="0.1" placeholder="">
        </div>

        <!-- Mesures (poids / taille) -->
        <div id="fieldsMesures" class="extra-fields">
            <label for="poidsValue" id="lblPoids"></label>
            <input type="number" id="poidsValue" step="0.1" placeholder="">
            <label for="tailleValue" id="lblTaille"></label>
            <input type="number" id="tailleValue" step="0.1" placeholder="">
        </div>

        <!-- Médicament -->
        <div id="fieldsMedicament" class="extra-fields">
            <label for="medicamentNom" id="lblMedNom"></label>
            <input type="text" id="medicamentNom" placeholder="">
            <label for="medicamentDose" id="lblMedDose"></label>
            <input type="text" id="medicamentDose" placeholder="">
        </div>

        <label for="notes" id="lblNotes"></label>
        <textarea id="notes" rows="2" placeholder=""></textarea>

        <button type="submit" id="saveButton">💾 Enregistrer</button>
        <button type="button" id="cancelButton" class="delete-btn" style="display:none;">Annuler modification</button>
    </form>

        // Conversions
        function cToF(celsius) {
            return (parseFloat(celsius) * 9/5 + 32).toFixed(1);
        }
        function fToC(fahrenheit) {
            return ((parseFloat(fahrenheit) - 32) * 5/9).toFixed(1);
        }
        function kgToLb(kg) {
            return (parseFloat(kg) * 2.20462).toFixed(1);
        }
        function lbToKg(lb) {
            return (parseFloat(lb) / 2.20462).toFixed(1);
        }
        function cmToIn(cm) {
            return (parseFloat(cm) / 2.54).toFixed(1);
        }
        function inToCm(inches) {
            return (parseFloat(inches) * 2.54).toFixed(1);
        }
        function mlToFlOz(ml) {
            return (parseFloat(ml) / 29.5735).toFixed(1);
        }
        function flOzToMl(flOz) {
            return (parseFloat(flOz) * 29.5735).toFixed(0);
        }

        // Résumé du jour
        function updateDailySummary() {
            const t = translations[currentLang];
            const today = new Date().toISOString().split('T')[0];
            const todayEntries = entries.filter(e => e.date && e.date.startsWith(today));
            if (todayEntries.length === 0) {
                dailySummaryEl.textContent = t.dailySummary.replace('{summary}', t.none);
                return;
            }
            const counts = {};
            todayEntries.forEach(e => {
                counts[e.type] = (counts[e.type] || 0) + 1;
            });
            const parts = Object.entries(counts).map(([type, count]) => {
                const badgeKey = 'badge' + type.charAt(0).toUpperCase() + type.slice(1);
                const badge = t[badgeKey] || type;
                return `${count} ${badge}`;
            });
            dailySummaryEl.textContent = t.dailySummary.replace('{summary}', parts.join(', '));
        }

        // Alerte médicament (Doliprane 6h, Motrin 6h, Tylenol 4h)
        function updateMedicationAlert() {
            const t = translations[currentLang];
            const now = new Date();
            let latestMed = null;
            let thresholdHours = 0;

            for (const entry of entries) {
                if (entry.type === 'medicament' && entry.nom) {
                    const nameLower = entry.nom.toLowerCase();
                    let currentThreshold = 0;
                    if (nameLower.includes('tylenol')) {
                        currentThreshold = 4;
                    } else if (nameLower.includes('doliprane') || nameLower.includes('motrin')) {
                        currentThreshold = 6;
                    }
                    if (currentThreshold === 0) continue;

                    const medDate = new Date(entry.date);
                    if (medDate <= now && (!latestMed || medDate > new Date(latestMed.date))) {
                        latestMed = entry;
                        thresholdHours = currentThreshold;
                    }
                }
            }

            if (!latestMed) {
                medicationAlert.style.display = 'none';
                return;
            }

            const elapsedMs = now - new Date(latestMed.date);
            const elapsedHours = Math.floor(elapsedMs / 3600000);
            const elapsedMinutes = Math.floor((elapsedMs % 3600000) / 60000);
            const thresholdMs = thresholdHours * 3600000;

            if (elapsedMs < thresholdMs) {
                const remainingMs = thresholdMs - elapsedMs;
                const remainingHours = Math.floor(remainingMs / 3600000);
                const remainingMinutes = Math.floor((remainingMs % 3600000) / 60000);
                medicationAlert.style.display = 'block';
                medicationAlert.textContent = t.medicationRecent
                    .replace('{name}', latestMed.nom)
                    .replace('{h}', elapsedHours)
                    .replace('{min}', elapsedMinutes > 0 ? ' ' + elapsedMinutes + 'min' : '')
                    .replace('{remaining}', remainingHours)
                    .replace('{remainingMin}', remainingMinutes > 0 ? ' ' + remainingMinutes + 'min' : '');
            } else {
                medicationAlert.style.display = 'none';
            }
        }

        // Filtrage
        function getFilteredEntries() {
            let filtered = entries;
            if (filterDate) {
                filtered = filtered.filter(e => e.date && e.date.startsWith(filterDate));
            }
            if (filterType) {
                filtered = filtered.filter(e => e.type === filterType);
            }
            return filtered;
        }

        function renderEntries() {
            const t = translations[currentLang];
            const filtered = getFilteredEntries();
            entryListDiv.innerHTML = '';
            if (filtered.length === 0) {
                entryListDiv.innerHTML = `<p>${t.noEntries}</p>`;
                return;
            }
            const sorted = [...filtered].sort((a, b) => (b.date || '').localeCompare(a.date || ''));
            sorted.forEach(entry => {
                const card = document.createElement('div');
                card.className = 'entry-card';

                let badgeHtml = '';
                let details = '';
                switch (entry.type) {
                    case 'biberon':
                        badgeHtml = `<span class="badge badge-biberon">${t.badgeBiberon}</span>`;
                        details = t.detailsBiberon(entry.quantite, entry.description);
                        break;
                    case 'repas':
                        badgeHtml = `<span class="badge badge-repas">${t.badgeRepas}</span>`;
                        details = t.detailsRepas(entry.description, entry.quantite);
                        break;
                    case 'pipi':
                        badgeHtml = `<span class="badge badge-pipi">${t.badgePipi}</span>`;
                        details = t.detailsPipi;
                        break;
                    case 'caca':
                        badgeHtml = `<span class="badge badge-caca">${t.badgeCaca}</span>`;
                        details = t.detailsCaca(entry.consistance);
                        break;
                    case 'sommeil':
                        badgeHtml = `<span class="badge badge-sommeil">${t.badgeSommeil}</span>`;
                        details = t.detailsSommeil(entry.sleepStart, entry.sleepEnd);
                        break;
                    case 'rdv':
                        badgeHtml = `<span class="badge badge-rdv">${t.badgeRdv}</span>`;
                        details = t.detailsRdv(entry.rdvDate, entry.rdvDesc);
                        break;
                    case 'temp':
                        badgeHtml = `<span class="badge badge-temp">${t.badgeTemp}</span>`;
                        details = t.detailsTemp(entry.temp, currentLang);
                        break;
                    case 'mesures':
                        badgeHtml = `<span class="badge badge-mesures">${t.badgeMesures}</span>`;
                        details = t.detailsMesures(entry.poids, entry.taille, currentLang);
                        break;
                    case 'bain':
                        badgeHtml = `<span class="badge badge-bain">${t.badgeBain}</span>`;
                        details = t.detailsBain;
                        break;
                    case 'medicament':
                        badgeHtml = `<span class="badge badge-medicament">${t.badgeMedicament}</span>`;
                        details = t.detailsMedicament(entry.nom, entry.dose);
                        break;
                    case 'autre':
                        badgeHtml = `<span class="badge badge-autre">${t.badgeAutre}</span>`;
                        details = t.detailsAutre;
                        break;
                }

                const dateFormatted = new Date(entry.date).toLocaleString(currentLang === 'fr' ? 'fr-FR' : 'en-US', {
                    day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit'
                });

                card.innerHTML = `
                    <div class="actions">
                        <button class="edit-btn" title="${t.editTitle}">✏️</button>
                        <button class="delete-btn" title="${t.deleteTitle}">🗑️</button>
                    </div>
                    <div style="margin-bottom:0.3rem;">${badgeHtml} <small>${dateFormatted}</small></div>
                    <div>${details}</div>
                    ${entry.notes ? '<div style="font-style:italic; margin-top:0.3rem;">' + entry.notes + '</div>' : ''}
                `;
                card.querySelector('.edit-btn').addEventListener('click', () => editEntry(entry));
                card.querySelector('.delete-btn').addEventListener('click', () => deleteEntry(entry.id));
                entryListDiv.appendChild(card);
            });

        // RDV alert
        function updateAppointmentAlert() {
            const t = translations[currentLang];
            const now = new Date();
            let closest = null;
            for (const entry of entries) {
                if (entry.type === 'rdv' && entry.rdvDate) {
                    const rdvTime = new Date(entry.rdvDate);
                    if (rdvTime > now) {
                        const diffDays = Math.ceil((rdvTime - now) / (1000 * 60 * 60 * 24));
                        if (diffDays <= 3 && (!closest || diffDays < closest.days)) {
                            closest = { days: diffDays, desc: entry.rdvDesc || '' };
                        }
                    }
                }
            }
            if (closest) {
                appointmentAlert.style.display = 'block';
                appointmentAlert.textContent = t.appointmentSoon
                    .replace('{days}', closest.days)
                    .replace('{desc}', closest.desc);
            } else {
                appointmentAlert.style.display = 'none';
            }
        }

        async function loadData() {
            const t = translations[currentLang];
            statusDiv.textContent = t.statusLoading;
            try {
                const response = await fetch(`${FIREBASE_URL}?${AUTH_PARAM}`);
                if (!response.ok) {
                    if (response.status === 401 || response.status === 403) throw new Error(t.errorAuth);
                    throw new Error(t.errorServer + ' (' + response.status + ')');
                }
                const data = await response.json();
                if (data && Array.isArray(data)) {
                    entries = data;
                } else {
                    entries = [];
                }
                localStorage.setItem('noahCache', JSON.stringify(entries));
                statusDiv.textContent = t.statusCloud;
            } catch (e) {
                console.warn('Firebase load error', e);
                let message = e.message;
                if (e instanceof TypeError) message = t.errorNetwork;
                statusDiv.textContent = message;
                const cached = localStorage.getItem('noahCache');
                if (cached) {
                    entries = JSON.parse(cached);
                    statusDiv.textContent += '\n' + t.statusOffline;
                } else {
                    entries = [];
                }
            }
            renderEntries();
            updateAppointmentAlert();
            updateMedicationAlert();
            updateDailySummary();
        }

        async function saveData() {
            const t = translations[currentLang];
            localStorage.setItem('noahCache', JSON.stringify(entries));
            try {
                const response = await fetch(`${FIREBASE_URL}?${AUTH_PARAM}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(entries)
                });
                if (response.ok) {
                    statusDiv.textContent = t.statusSavedCloud;
                } else {
                    if (response.status === 401 || response.status === 403) throw new Error(t.errorAuth);
                    throw new Error(t.errorServer + ' (' + response.status + ')');
                }
            } catch (e) {
                console.error('Firebase save error', e);
                let message = e.message;
                if (e instanceof TypeError) message = t.errorNetwork;
                statusDiv.textContent = message + '\n' + t.statusSavedLocal;
            }
            updateAppointmentAlert();
            updateMedicationAlert();
            updateDailySummary();
        }

        async function deleteEntry(id) {
            const t = translations[currentLang];
            if (!confirm(t.deleteConfirm)) return;
            entries = entries.filter(e => e.id !== id);
            await saveData();
            renderEntries();
            if (editingId === id) resetForm();
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const type = eventTypeSelect.value;
            const date = eventDateInput.value;
            if (!type || !date) return;

            const newEntry = {
                id: editingId || generateId(),
                type: type,
                date: date,
                notes: notesInput.value.trim()
            };

            if (type === 'biberon') {
                let qty = biberonQuantite.value.trim();
                if (qty !== '') {
                    newEntry.quantite = currentLang === 'en' ? flOzToMl(qty) : qty;
                } else {
                    newEntry.quantite = '';
                }
                newEntry.description = biberonType.value.trim();
            } else if (type === 'repas') {
                newEntry.description = repasDescription.value.trim();
                newEntry.quantite = repasQuantite.value.trim();
            } else if (type === 'caca') {
                newEntry.consistance = cacaConsistance.value;
            } else if (type === 'sommeil') {
                newEntry.sleepStart = sleepStart.value;
                newEntry.sleepEnd = sleepEnd.value;
            } else if (type === 'rdv') {
                newEntry.rdvDesc = rdvDesc.value.trim();
                newEntry.rdvDate = rdvDate.value;
            } else if (type === 'temp') {
                let tempVal = tempValue.value.trim();
                if (tempVal !== '') {
                    newEntry.temp = currentLang === 'en' ? fToC(tempVal) : tempVal;
                } else {
                    newEntry.temp = '';
                }
            } else if (type === 'mesures') {
                let poidsVal = poidsValue.value.trim();
                if (poidsVal !== '') {
                    newEntry.poids = currentLang === 'en' ? lbToKg(poidsVal) : poidsVal;
                } else {
                    newEntry.poids = '';
                }
                let tailleVal = tailleValue.value.trim();
                if (tailleVal !== '') {
                    newEntry.taille = currentLang === 'en' ? inToCm(tailleVal) : tailleVal;
                } else {
                    newEntry.taille = '';
                }
            } else if (type === 'medicament') {
                newEntry.nom = medicamentNom.value.trim();
                newEntry.dose = medicamentDose.value.trim();
            }

            if (editingId) {
                const index = entries.findIndex(e => e.id === editingId);
                if (index !== -1) entries[index] = newEntry;
            } else {
                entries.push(newEntry);
            }

            await saveData();
            resetForm();
            renderEntries();
        });

        cancelButton.addEventListener('click', resetForm);

        // Lancer une vérification périodique du médicament toutes les 30 secondes
        function startMedicationTimer() {
            if (medicationTimerInterval) clearInterval(medicationTimerInterval);
            medicationTimerInterval = setInterval(updateMedicationAlert, 30000);
        }
        startMedicationTimer();

        applyLanguage(currentLang);
        loadData();
    </script>
</body>
</html>
